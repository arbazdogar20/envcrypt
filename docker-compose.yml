services:
  postgres:
    image: postgres:16
    container_name: envcrypt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: envcrypt
      POSTGRES_PASSWORD: envcrypt_secret
      POSTGRES_DB: envcrypt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nestjs_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis:
    image: redis:7
    container_name: envcrypt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
